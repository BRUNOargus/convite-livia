<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Convite Hogwarts</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Georgia, serif;
    color: white;
}

/* FUNDO */
.fundo {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(#0b0c1a, #000);
}

/* ESTRELAS */
.estrelas {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
}

.estrelas::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    box-shadow:
        100px 200px white,
        300px 400px white,
        500px 100px white,
        800px 600px white,
        1200px 300px white,
        1500px 500px white;
    animation: piscar 2s infinite;
}

@keyframes piscar {
    0%,100% {opacity: 0.5;}
    50% {opacity: 1;}
}

/* TELA */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* CORUJA */
.corujeira {
    font-size: 50px;
    animation: voar 2s infinite alternate;
}

@keyframes voar {
    from { transform: translateX(-20px); }
    to { transform: translateX(20px); }
}

/* ENVELOPE */
.envelope {
    width: 150px;
    margin-top: 20px;
    cursor: pointer;
    transition: 0.4s;
}

.envelope:hover {
    transform: scale(1.1) rotate(3deg);
}

/* CARTA */
.carta {
    display: none;
    position: absolute;
    width: 60%;
    background: #f5e6c8;
    color: black;
    padding: 40px;
    border: 6px solid #8b0000;
    border-radius: 10px;
    animation: abrir 1.5s;
}

/* ANIMAÇÃO PERGAMINHO */
@keyframes abrir {
    from {
        transform: scaleY(0);
        opacity: 0;
    }
    to {
        transform: scaleY(1);
        opacity: 1;
    }
}

h1 {
    font-size: 40px;
}

</style>
</head>

<body>

<!-- SOM -->
<audio id="audio" src="https://www.soundjay.com/magic/magic-chime-01.mp3"></audio>

<div class="fundo"></div>
<div class="estrelas"></div>

<div class="overlay" id="inicio">
    <div class="corujeira">🦉</div>

    <h2 id="mensagem"></h2>

    <img class="envelope"
    src="https://cdn-icons-png.flaticon.com/512/1040/1040230.png"
    onclick="abrirCarta()">
</div>

<div class="carta" id="carta">
    <h2>Escola de Magia e Bruxaria de Hogwarts</h2>

    <p id="nomeConvite"></p>

    <h1>🧙‍♀️ LÍVIA ⚡</h1>
    <p>está completando <b>9 anos</b></p>

    <p>Prepare sua varinha!</p>

    <hr>

    <p>📅 Data: ___</p>
    <p>⏰ Horário: ___</p>
    <p>📍 Local: ___</p>

    <hr>

    <p>🚂 Plataforma 9¾ espera por você</p>
</div>

<script>

/* PEGAR NOME DO LINK */
const params = new URLSearchParams(window.location.search);
const nome = params.get("nome");

/* PERSONALIZAÇÃO */
if(nome){
    document.getElementById("mensagem").innerText =
        "Sr(a). " + nome + ", uma coruja trouxe sua carta...";
    
    document.getElementById("nomeConvite").innerText =
        "Prezado(a) " + nome + ",";
} else {
    document.getElementById("mensagem").innerText =
        "Uma coruja trouxe sua carta...";
}

/* ABRIR CARTA */
function abrirCarta(){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("carta").style.display = "block";
    document.getElementById("audio").play();
}

</script>

</body>
</html>
