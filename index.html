<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convite Mágico da Lívia</title>

  <style>
    :root{
      --gold:#f0d48a;
      --paper-1:#f8ecd0;
      --paper-2:#eed6a6;
      --ink:#2d1d08;
      --burgundy:#6c1121;
      --burgundy-dark:#3d0912;
      --shadow:rgba(0,0,0,.45);
      --sky-top:#08111f;
      --sky-mid:#132342;
      --sky-bottom:#1a1027;
      --moon:#f8f0d8;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,.12), transparent 16%),
        linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
      color:#fff;
      overflow:hidden;
    }

    /* Camadas principais */
    .sky,
    .fog,
    .castle,
    .glow,
    .owl,
    .scene,
    #stars,
    #dust {
      position: fixed;
      inset: 0;
    }

    #stars, #dust {
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .glow{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,236,185,.09), transparent 20%),
        radial-gradient(circle at 10% 30%, rgba(123,162,255,.08), transparent 18%),
        radial-gradient(circle at 90% 25%, rgba(255,190,125,.08), transparent 16%);
      pointer-events:none;
    }

    .moon{
      position: fixed;
      top: 7vh;
      right: 8vw;
      width: min(11vw, 130px);
      aspect-ratio:1;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fffef2 0%, var(--moon) 50%, #dbcaa5 100%);
      box-shadow:
        0 0 30px rgba(248,240,216,.55),
        0 0 80px rgba(248,240,216,.18);
      opacity:.9;
      z-index:1;
    }

    /* Castelo em SVG */
    .castle{
      bottom:0;
      top:auto;
      height:min(43vh, 380px);
      z-index:2;
      filter: drop-shadow(0 -8px 18px rgba(0,0,0,.55));
      opacity:.96;
      pointer-events:none;
    }
    .castle svg{
      width:100%;
      height:100%;
      display:block;
    }

    /* Névoa */
    .fog{
      z-index:3;
      pointer-events:none;
      overflow:hidden;
    }
    .fog-layer{
      position:absolute;
      left:-20%;
      width:140%;
      height:34%;
      border-radius:50%;
      filter: blur(18px);
      opacity:.22;
      background:
        radial-gradient(circle at 20% 50%, rgba(210,225,255,.55), transparent 18%),
        radial-gradient(circle at 38% 48%, rgba(220,230,255,.45), transparent 17%),
        radial-gradient(circle at 55% 52%, rgba(230,240,255,.50), transparent 16%),
        radial-gradient(circle at 72% 46%, rgba(220,235,255,.42), transparent 17%),
        radial-gradient(circle at 88% 51%, rgba(225,238,255,.46), transparent 16%);
      animation: drift linear infinite;
    }
    .fog-1{ bottom: 10vh; animation-duration: 38s; }
    .fog-2{ bottom: 4vh; opacity:.28; animation-duration: 52s; animation-direction: reverse; }
    .fog-3{ bottom: 16vh; opacity:.16; animation-duration: 64s; }

    @keyframes drift{
      from{ transform: translateX(0); }
      to{ transform: translateX(10%); }
    }

    /* Coruja voando */
    .owl{
      z-index:7;
      pointer-events:none;
      overflow:hidden;
    }
    .owl span{
      position:absolute;
      top:16vh;
      left:-12vw;
      font-size: clamp(34px, 4vw, 58px);
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.4));
      animation: flyAcross 16s linear infinite;
    }

    @keyframes flyAcross{
      0%   { transform: translate(-10vw, 0) scale(.8) rotate(-2deg); opacity:0; }
      8%   { opacity:1; }
      22%  { transform: translate(20vw, -2vh) scale(.92) rotate(3deg); }
      40%  { transform: translate(45vw, 1vh) scale(1) rotate(-1deg); }
      60%  { transform: translate(68vw, -3vh) scale(.96) rotate(4deg); }
      85%  { opacity:1; }
