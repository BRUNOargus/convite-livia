<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Convite Hogwarts</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    overflow: hidden;
}

/* FUNDO MÁGICO (CASTELO) */
.fundo {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center;
    background-size: cover;
    filter: brightness(0.4);
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

/* TEXTO */
.titulo {
    font-size: 36px;
    margin-bottom: 20px;
}

/* ENVELOPE */
.envelope {
    width: 180px;
    cursor: pointer;
    transition: 0.4s;
}

.envelope:hover {
    transform: scale(1.1);
}

/* CARTA */
.carta {
    position: absolute;
    width: 60%;
    background: #f5e6c8;
    padding: 40px;
    border: 6px solid #8b0000;
    border-radius: 10px;
    display: none;
    color: black;
    animation: aparecer 1.5s;
}

@keyframes aparecer {
    from {
        transform: scale(0.6);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

h1 {
    font-size: 45px;
}

</style>
</head>

<body>

<div class="fundo"></div>

<div class="overlay" id="inicio">
    <div class="titulo">🦉 Uma coruja trouxe sua carta...</div>

    <!-- ENVELOPE CORRIGIDO -->
    <img class="envelope"
         src="https://cdn-icons-png.flaticon.com/512/1040/1040230.png"
         onclick="abrirCarta()">
</div>

<div id="carta" class="carta">
    <h2>Escola de Magia e Bruxaria de Hogwarts</h2>

    <p>Temos o prazer de informar que você foi selecionado(a)
    para um evento mágico!</p>

    <h1>🧙‍♀️ LÍVIA ⚡</h1>
    <p>está completando <b>9 anos</b></p>

    <p>Prepare sua varinha e venha viver essa experiência!</p>

    <hr>

    <p>📅 Data: ___</p>
